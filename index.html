<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicotine Addiction - Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="index.html">Homepage</a>
      <a href="brain.html">Brain</a>
      <a href="about.html">About Us</a>
      <a href="sources.html">Sources</a>
    </nav>
    <span class="site-title">Nicotine Effects: The Brain</span>
  </header>
  <main>
    <h1 class="home-title">Nicotine Addiction - Brain</h1>

    <section class="home-hero-wrapper">
      <div class="home-hero-pin">
        <img src="brickbrain.png" class="home-bricky" id="homeBrickwall" alt="Brick wall and brain">
        <img src="blackbrain.png" class="home-blackbrain-layer" id="homeBlackbrainLayer" alt="Black brain">

        <div class="loop-content" id="loopContent">
          <svg class="loop-arrows" viewBox="0 0 400 400" aria-hidden="true">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="6" refY="5" orient="auto">
                <path d="M0,0 L10,5 L0,10 Z" fill="#ce55a5" />
              </marker>
            </defs>
            <!-- 1 (top) -> 2 (right) -->
            <path d="M 230,60 A 170,170 0 0,1 340,200" fill="none" stroke="#ce55a5" stroke-width="3" marker-end="url(#arrowhead)" />
            <!-- 2 (right) -> 3 (bottom) -->
            <path d="M 340,230 A 170,170 0 0,1 230,340" fill="none" stroke="#ce55a5" stroke-width="3" marker-end="url(#arrowhead)" />
            <!-- 3 (bottom) -> 4 (left) -->
            <path d="M 170,340 A 170,170 0 0,1 60,230" fill="none" stroke="#ce55a5" stroke-width="3" marker-end="url(#arrowhead)" />
            <!-- 4 (left) -> 1 (top) -->
            <path d="M 60,170 A 170,170 0 0,1 170,60" fill="none" stroke="#ce55a5" stroke-width="3" marker-end="url(#arrowhead)" />
          </svg>

          <div class="loop-step loop-step-1">
            <span class="loop-number">1</span>
            <span class="loop-label">You Use</span>
          </div>
          <div class="loop-step loop-step-2">
            <span class="loop-number">2</span>
            <span class="loop-label">Dopamine Release</span>
          </div>
          <div class="loop-step loop-step-3">
            <span class="loop-number">3</span>
            <span class="loop-label">You Learn</span>
          </div>
          <div class="loop-step loop-step-4">
            <span class="loop-number">4</span>
            <span class="loop-label">You Crave</span>
          </div>
        </div>

      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
