<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicotine Addiction - Brain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <nav class="site-nav">
      <a href="index.html">Homepage</a>
      <a href="brain.html">Brain</a>
      <a href="about.html">About Us</a>
      <a href="sources.html">Sources</a>
    </nav>
    <span class="site-title">Nicotine Effects: The Brain</span>
  </header>
  <main>
    <h1 class="home-title">Nicotine Addiction - Brain</h1>

    <section class="home-hero-wrapper">
      <div class="home-hero-pin">
        <img src="brickbrain.png" class="home-bricky" id="homeBrickwall" alt="Brick wall and brain">
        <img src="blackbrain.png" class="home-blackbrain-layer" id="homeBlackbrainLayer" alt="Black brain">

        <div class="loop-content" id="loopContent">
          <svg class="loop-arrows" viewBox="0 0 1000 1000" aria-hidden="true">
            <defs>
              <marker id="arrowhead" markerWidth="14" markerHeight="14" refX="8" refY="7" orient="auto">
                <path d="M0,0 L14,7 L0,14 Z" fill="#ce55a5" />
              </marker>
            </defs>
            <!-- 1 (top, 500,375) -> 2 (right, 950,500) -->
            <path d="M 500,375 Q 850,375 950,500" fill="none" stroke="#ce55a5" stroke-width="4" marker-end="url(#arrowhead)" />
            <!-- 2 (right, 950,500) -> 3 (bottom, 500,850) -->
            <path d="M 950,500 Q 800,800 500,850" fill="none" stroke="#ce55a5" stroke-width="4" marker-end="url(#arrowhead)" />
            <!-- 3 (bottom, 500,850) -> 4 (left, 50,500) -->
            <path d="M 500,850 Q 150,800 50,500" fill="none" stroke="#ce55a5" stroke-width="4" marker-end="url(#arrowhead)" />
            <!-- 4 (left, 50,500) -> 1 (top, 500,375) -->
            <path d="M 50,500 Q 150,375 500,375" fill="none" stroke="#ce55a5" stroke-width="4" marker-end="url(#arrowhead)" />
          </svg>

          <div class="loop-step loop-step-1">
            <span class="loop-number">1</span>
            <span class="loop-label">You Use</span>
          </div>
          <div class="loop-step loop-step-2">
            <span class="loop-number">2</span>
            <span class="loop-label">Dopamine Release</span>
          </div>
          <div class="loop-step loop-step-3">
            <span class="loop-number">3</span>
            <span class="loop-label">You Learn</span>
          </div>
          <div class="loop-step loop-step-4">
            <span class="loop-number">4</span>
            <span class="loop-label">You Crave</span>
          </div>
        </div>

      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
